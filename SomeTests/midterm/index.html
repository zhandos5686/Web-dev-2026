<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = String(prompt("Enter a number:"));

        let vowels = "aeioAEIOUu";
        let count = 0;
        for(let char of n){
            if(vowels.includes(char)){
                count++;
            }
        }

        console.log("Factorial:", count);
    </script>
</body>
</html>
